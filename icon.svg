<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a3a1a"/>
  <!-- Outer window frame -->
  <rect x="80" y="80" width="352" height="352" rx="28" fill="none" stroke="#c8941a" stroke-width="28"/>
  <!-- Horizontal divider -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="#c8941a" stroke-width="18"/>
  <!-- Vertical divider -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#c8941a" stroke-width="18"/>
  <!-- Top-left pane: gold fill -->
  <rect x="100" y="100" width="140" height="140" rx="8" fill="#c8941a" opacity="0.18"/>
  <!-- Top-right pane: sage fill -->
  <rect x="272" y="100" width="140" height="140" rx="8" fill="#4a8c4a" opacity="0.22"/>
  <!-- Bottom-left pane: sage fill -->
  <rect x="100" y="272" width="140" height="140" rx="8" fill="#4a8c4a" opacity="0.22"/>
  <!-- Bottom-right pane: gold fill -->
  <rect x="272" y="272" width="140" height="140" rx="8" fill="#c8941a" opacity="0.18"/>
  <!-- Centre knob -->
  <circle cx="256" cy="256" r="18" fill="#e8b840"/>
  <circle cx="256" cy="256" r="9"  fill="#1a3a1a"/>
</svg>
